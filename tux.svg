<svg width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e2e2"/>
    </linearGradient>
    <linearGradient id="beak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb84d"/>
      <stop offset="100%" stop-color="#e08c1f"/>
    </linearGradient>
  </defs>

  <g>
    <animateTransform
      attributeName="transform"
      type="rotate"
      values="-6 80 150; 6 80 150; -6 80 150"
      dur="2.4s"
      repeatCount="indefinite" />

    <!-- feet -->
    <ellipse cx="65" cy="148" rx="14" ry="6" fill="url(#beak)"/>
    <ellipse cx="95" cy="148" rx="14" ry="6" fill="url(#beak)"/>

    <!-- body -->
    <ellipse cx="80" cy="95" rx="42" ry="52" fill="url(#body)"/>

    <!-- belly -->
    <ellipse cx="80" cy="105" rx="26" ry="38" fill="url(#belly)"/>

    <!-- left flipper -->
    <g>
      <animateTransform
        attributeName="transform"
        type="rotate"
        values="-15 45 80; 15 45 80; -15 45 80"
        dur="1.2s"
        repeatCount="indefinite" />
      <ellipse cx="42" cy="90" rx="10" ry="28" fill="url(#body)"/>
    </g>

    <!-- right flipper -->
    <ellipse cx="118" cy="95" rx="10" ry="28" fill="url(#body)"/>

    <!-- head -->
    <circle cx="80" cy="45" r="30" fill="url(#body)"/>

    <!-- face patch -->
    <ellipse cx="80" cy="52" rx="17" ry="14" fill="url(#belly)"/>

    <!-- eyes -->
    <circle cx="72" cy="42" r="4" fill="#111111"/>
    <circle cx="88" cy="42" r="4" fill="#111111"/>
    <circle cx="73" cy="41" r="1.2" fill="#ffffff"/>
    <circle cx="89" cy="41" r="1.2" fill="#ffffff"/>

    <!-- beak -->
    <polygon points="80,50 70,58 90,58" fill="url(#beak)"/>
  </g>
</svg>
